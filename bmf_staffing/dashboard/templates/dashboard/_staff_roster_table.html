{% if rows %}
<table class="table mb-0">
  <thead>
    <tr>
      <th scope="col" style="width: 4rem;">Role</th>
      <th scope="col">Name</th>
      <th scope="col" class="text-end" style="width: 6rem;">Remove</th>
    </tr>
  </thead>
  <tbody>
    {% for row in rows %}
    <tr>
      <td class="text-muted small">{{ row.role }}</td>
      <td>{{ row.display }}</td>
      <td class="text-end">
        <form method="post" class="d-inline" onsubmit="return confirm('Remove {{ row.display|escapejs }} from the active roster?');">
          {% csrf_token %}
          <input type="hidden" name="action" value="deactivate">
          <input type="hidden" name="roster_id" value="{{ row.id }}">
          <button type="submit" class="btn btn-outline-danger btn-sm">Remove</button>
        </form>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% else %}
<p class="text-muted p-3 mb-0">No one on this role tab yet.</p>
{% endif %}
