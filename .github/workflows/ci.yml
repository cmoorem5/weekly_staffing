name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    # Windows is in the matrix because production is a Windows laptop —
    # Ubuntu alone never exercises the paths the real deployment uses.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        if: runner.os == 'Linux'
        run: |
          ruff check .
          ruff format --check .

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Run Crew Hub Django tests
        run: python bmf_staffing/manage.py test crew_hub -v 2

  audit:
    # Pinned dependencies stay reproducible but also freeze known CVEs —
    # this surfaces advisories against the pins so they get bumped.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Audit pinned dependencies (pip-audit)
        run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit -r requirements.txt -r requirements-dev.txt
